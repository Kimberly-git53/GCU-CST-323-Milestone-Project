<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Comic Book</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

    <!-- Custom Styling -->
    <style>

        body {
            background: linear-gradient(to right, #1c1c1c, #3a3a3a);
            color: white;
        }

        h1 {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            font-size: 3rem;
            text-shadow: 2px 2px 5px black;
        }

        .card {
            background-color: white;
            color: black;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .navbar-brand {
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <a class="navbar-brand" href="/comicbooks">Comic Library</a>

    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">

            <li class="nav-item">
                <a class="nav-link" href="/comicbooks">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/comicbooks/create">Add Comic</a>
            </li>

        </ul>
    </div>

</nav>

<!-- CONTENT -->
<div class="container mt-4">

    <h1 class="text-center mb-4">Edit Comic Book</h1>

    <div class="card p-4">

        <form th:action="@{/comicbooks/edit/{id}(id=${comicBook.id})}" method="post">

            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" class="form-control"
                       th:value="${comicBook.title}" required>
            </div>

            <div class="form-group">
                <label for="publisher">Publisher:</label>
                <input type="text" id="publisher" name="publisher" class="form-control"
                       th:value="${comicBook.publisher}" required>
            </div>

            <div class="form-group">
                <label for="issueNumber">Issue Number:</label>
                <input type="number" id="issueNumber" name="issueNumber" class="form-control"
                       th:value="${comicBook.issueNumber}" required>
            </div>

            <div class="form-group">
                <label for="releaseYear">Release Year:</label>
                <input type="number" id="releaseYear" name="releaseYear" class="form-control"
                       th:value="${comicBook.releaseYear}" required>
            </div>

            <div class="form-group">
                <label for="author">Author:</label>
                <input type="text" id="author" name="author" class="form-control"
                       th:value="${comicBook.author}" required>
            </div>

            <div class="form-group">
                <label for="genre">Genre:</label>
                <input type="text" id="genre" name="genre" class="form-control"
                       th:value="${comicBook.genre}" required>
            </div>

            <div class="text-center">

                <button type="submit" class="btn btn-success">
                    Update Comic Book
                </button>

                <a th:href="@{/comicbooks}" class="btn btn-secondary ml-2">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
