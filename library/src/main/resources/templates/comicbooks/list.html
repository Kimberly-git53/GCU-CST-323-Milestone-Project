<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Comic Book List</title>
</head>
<body>

<h1>Comic Book Library</h1>

<a href="/comicbooks/create">Add New Comic</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Publisher</th>
        <th>Actions</th>
    </tr>

    <tr th:each="comic : ${comicBooks}">
        <td th:text="${comic.id}"></td>
        <td th:text="${comic.title}"></td>
        <td th:text="${comic.publisher}"></td>
        <td>
            <a th:href="@{/comicbooks/edit/{id}(id=${comic.id})}">Edit</a>
            <a th:href="@{/comicbooks/delete/{id}(id=${comic.id})}">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
